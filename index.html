<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kletter-App</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
	<link rel="manifest" href="manifest.webmanifest">
  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    #map {
      height: 400px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<h1>Kletter-App</h1>

<select id="filter">
  <option value="all">Alle</option>
  <option value="A">A</option>
  <option value="B">B</option>
  <option value="C">C</option>
</select>

<input id="search" placeholder="Suche..." style="width:100%; padding:8px; margin:10px 0;">

<div id="map"></div>

<div id="app"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
